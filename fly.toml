# Fly.io 部署配置 — pikachu-music-api
# 文档：https://fly.io/docs/reference/configuration/

app = "pikachu-music-api"
primary_region = "sin"  # 新加坡，国内访问速度较好

# 容器配置
[build]
  dockerfile = "Dockerfile"

# 运行时配置
[env]
  PORT = "8080"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # 健康检查
  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/api/v1/music/search?q=test&type=song&n=1"
    protocol = "http"

# 单实例配置（免费档）
[processes]
  app = "go-music-api web --port 8080"

# 自动启停（省资源）
# 注意：免费档会 sleep，但 Pikachu RN client 端 waitForApi 15s 轮询可唤醒
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# 挂载卷：持久化 cookies.json
# 注意：必须在 fly deploy 之前手动 fly volumes create cookies --size 1
# [mounts]  # 取消注释并配置正确路径后启用
#   source = "cookies"
#   destination = "/home/appuser/cookies"
